{% extends 'base.html' %}

{% block content %}

<h2>Complaints</h2>

<table class="table table-dark table-striped mt-3">
    <thead>
        <tr>
            <th>Issue</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for complaint in complaints %}
        <tr>
            <td>{{ complaint.issue }}</td>
            <td>
                <span class="badge 
                    {% if complaint.status == 'Pending' %}bg-warning text-dark
                    {% elif complaint.status == 'Resolved' %}bg-success
                    {% else %}bg-info{% endif %}">
                    {{ complaint.status }}
                </span>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No complaints found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
